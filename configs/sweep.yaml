# Wandb sweep configuration for hyperparameter search
# Based on Appendix B.3: ~500 runs per method
#
# Usage:
#   wandb sweep configs/sweep.yaml
#   wandb agent <sweep_id>

program: scripts/finetune.py
method: grid
project: rl-razor-sweep-pretrain-epoch5_450x5
name: rl-razor-sweep-pretrain-epoch5_450x5

# Metric to optimize
metric:
  name: val_parity_acc
  goal: maximize

# Parameters to sweep
parameters:
  # Fixed parameters (Changed underscores to hyphens to match argparse)
  pretrained-model:
    value: experiments/pretrain_lr1e-3_epoch5_wd0.0_20260309_055220/pretrained_model.pt
  data-dir:
    value: ./data
  exp-dir:
    value: experiments/sweep_pretrain_epoch5_450x5

  # Method (run separate sweeps for each)
  method:
    values:
      - sft1
      - sft2
      - oracle
      - grpo
      - grpo_kl

  # Learning rate: 15 values log-spaced in [3e-6, 1e-3]
  lr:
    values:
      - 3.0e-06
      - 4.54e-06
      - 6.88e-06
      - 1.04e-05
      - 1.58e-05
      - 2.39e-05
      - 3.62e-05
      - 5.48e-05
      - 8.29e-05
      - 1.26e-04
      - 1.90e-04
      - 2.88e-04
      - 4.36e-04
      - 6.60e-04
      - 1.0e-03

  # Scheduler
  scheduler:
    values:
      - cosine_with_warmup
      - constant_with_warmup

  # Epochs
  epochs:
    values:
      - 1
      - 2
  checkpoint-every:
    value: 0.2

  # Random seeds
  seed:
    values:
      - 42

# Command template
command:
  - ${env}
  - ${interpreter}
  - ${program}
  - --wandb  # Hardcoded the flag here so it doesn't pass a "True" value
  - ${args}  # This automatically safely packs all your parameters!